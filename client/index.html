<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Cloning Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        /* Paper & Ink — Editorial Minimalism */
        --bg-base: #FAFAF8;
        --bg-surface: #F5F5F0;
        --bg-surface-hover: #EDEDEA;
        --bg-inset: #F0F0EC;
        --bg-elevated: #FFFFFF;

        --border-hairline: #E0E0DC;
        --border-default: #D4D4CF;
        --border-strong: #1A1A1A;

        --text-primary: #1A1A1A;
        --text-secondary: #4A4A4A;
        --text-tertiary: #8A8A8A;
        --text-muted: #B5B5B0;

        /* Single accent: vermillion red */
        --accent: #E63946;
        --accent-hover: #D32F3B;
        --accent-soft: rgba(230, 57, 70, 0.06);
        --accent-medium: rgba(230, 57, 70, 0.12);

        --success: #1A1A1A;
        --success-soft: rgba(26, 26, 26, 0.04);
        --success-medium: rgba(26, 26, 26, 0.08);

        --error: #E63946;
        --error-soft: rgba(230, 57, 70, 0.05);
        --error-medium: rgba(230, 57, 70, 0.10);

        --warning: #1A1A1A;
        --warning-soft: rgba(26, 26, 26, 0.05);

        --audio-track: #E0E0DC;
        --audio-fill: #1A1A1A;
        --audio-thumb: #1A1A1A;

        --radius-sm: 3px;
        --radius-md: 4px;
        --radius-lg: 6px;
        --radius-xl: 8px;

        --shadow-sm: 0 1px 2px rgba(26, 26, 26, 0.04);
        --shadow-md: 0 2px 8px rgba(26, 26, 26, 0.05);
        --shadow-lg: 0 4px 20px rgba(26, 26, 26, 0.07);

        --font-display: 'Instrument Serif', Georgia, serif;
        --font-body: 'Geist', -apple-system, BlinkMacSystemFont, sans-serif;
        --font-mono: 'Geist Mono', 'Consolas', monospace;
      }

      body {
        font-family: var(--font-body);
        background: var(--bg-base);
        color: var(--text-primary);
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }

      /* Scrollbar — thin, understated */
      ::-webkit-scrollbar { width: 4px; height: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-default); border-radius: 2px; }
      ::-webkit-scrollbar-thumb:hover { background: var(--text-tertiary); }

      /* Range inputs — editorial, black/red only */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 1px;
        background: var(--border-strong);
        border-radius: 0;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--text-primary);
        cursor: pointer;
        border: 2px solid var(--bg-elevated);
        box-shadow: 0 0 0 1px var(--text-primary);
        transition: transform 0.15s ease, background 0.15s ease;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.15);
        background: var(--accent);
        box-shadow: 0 0 0 1px var(--accent);
      }
      input[type="range"]::-moz-range-thumb {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: var(--text-primary);
        cursor: pointer;
        border: 2px solid var(--bg-elevated);
        box-shadow: 0 0 0 1px var(--text-primary);
      }
      input[type="range"]:disabled {
        opacity: 0.35;
        cursor: not-allowed;
      }

      /* Select — clean, no rounded corners */
      select {
        -webkit-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%231A1A1A' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 12px center;
        padding-right: 32px !important;
      }

      /* Audio element */
      audio {
        width: 100%;
        height: 42px;
        border-radius: var(--radius-md);
        outline: none;
      }
      audio::-webkit-media-controls-panel {
        background: var(--bg-inset);
        border-radius: var(--radius-md);
      }

      /* File input */
      input[type="file"] {
        font-family: var(--font-body);
      }
      input[type="file"]::file-selector-button {
        font-family: var(--font-body);
        padding: 7px 16px;
        border-radius: var(--radius-sm);
        border: 1px solid var(--border-strong);
        background: var(--bg-elevated);
        color: var(--text-primary);
        cursor: pointer;
        font-size: 13px;
        font-weight: 500;
        margin-right: 10px;
        transition: all 0.15s ease;
      }
      input[type="file"]::file-selector-button:hover {
        background: var(--text-primary);
        color: var(--bg-elevated);
      }

      /* Animations — subtle, precise */
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(6px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slide-in {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
      @keyframes pulse-dot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }
      @keyframes grow-line {
        from { transform: scaleX(0); }
        to { transform: scaleX(1); }
      }

      /* Selection color */
      ::selection {
        background: var(--accent);
        color: white;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
