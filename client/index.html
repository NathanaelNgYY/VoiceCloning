<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Voice Cloning Studio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
        background: #0c0c0f;
        color: #e0ddd8;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      #root { min-height: 100vh; }

      /* Custom scrollbar */
      ::-webkit-scrollbar { width: 6px; height: 6px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: #2a2a30; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #3a3a42; }

      /* Range input styling */
      input[type="range"] {
        -webkit-appearance: none;
        appearance: none;
        width: 100%;
        height: 4px;
        background: #1e1e24;
        border-radius: 2px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #d4a053;
        cursor: pointer;
        border: 2px solid #0c0c0f;
        box-shadow: 0 0 8px rgba(212, 160, 83, 0.3);
        transition: transform 0.15s ease, box-shadow 0.15s ease;
      }
      input[type="range"]::-webkit-slider-thumb:hover {
        transform: scale(1.2);
        box-shadow: 0 0 12px rgba(212, 160, 83, 0.5);
      }
      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #d4a053;
        cursor: pointer;
        border: 2px solid #0c0c0f;
        box-shadow: 0 0 8px rgba(212, 160, 83, 0.3);
      }

      /* Select styling */
      select {
        -webkit-appearance: none;
        appearance: none;
        background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L5 5L9 1' stroke='%236b6b70' stroke-width='1.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 12px center;
        padding-right: 32px !important;
      }

      /* Audio element styling */
      audio {
        width: 100%;
        height: 40px;
        border-radius: 8px;
        outline: none;
      }
      audio::-webkit-media-controls-panel {
        background: #18181d;
      }

      /* File input */
      input[type="file"] {
        font-family: 'DM Sans', sans-serif;
      }
      input[type="file"]::file-selector-button {
        font-family: 'DM Sans', sans-serif;
        padding: 6px 14px;
        border-radius: 6px;
        border: 1px solid #2a2a30;
        background: #18181d;
        color: #b0ada6;
        cursor: pointer;
        font-size: 13px;
        margin-right: 10px;
        transition: all 0.2s ease;
      }
      input[type="file"]::file-selector-button:hover {
        background: #222228;
        border-color: #d4a053;
        color: #d4a053;
      }

      /* Animations */
      @keyframes pulse-glow {
        0%, 100% { opacity: 1; box-shadow: 0 0 8px rgba(212, 160, 83, 0.4); }
        50% { opacity: 0.7; box-shadow: 0 0 16px rgba(212, 160, 83, 0.6); }
      }
      @keyframes fade-in {
        from { opacity: 0; transform: translateY(8px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes slide-in {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
      @keyframes shimmer {
        0% { background-position: -200% 0; }
        100% { background-position: 200% 0; }
      }
      @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
