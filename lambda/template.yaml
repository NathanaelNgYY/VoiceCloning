AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Voice Cloning Studio serverless REST API

Parameters:
  S3Bucket:
    Type: String
    Description: S3 bucket name for voice cloning data
  S3Region:
    Type: String
    Default: ap-southeast-1
    Description: AWS region for the S3 bucket
  S3Prefix:
    Type: String
    Default: echolect/
    Description: Optional S3 object prefix
  GpuWorkerUrl:
    Type: String
    Description: URL for the GPU Worker service, for example http://10.0.2.25:3001
  GpuWorkerPublicUrl:
    Type: String
    Default: ''
    Description: Browser-accessible GPU Worker URL for direct artifact downloads, for example https://gpu-worker-alb.example.com
  GpuInstanceId:
    Type: String
    Default: ''
    Description: Optional GPU EC2 instance ID. When set, /api/instance/start can start this stopped instance on user click.
  GpuInstanceRegion:
    Type: String
    Default: ap-northeast-2
    Description: AWS region for the GPU EC2 instance.
  ModelSource:
    Type: String
    Default: gpu-worker
    AllowedValues:
      - gpu-worker
      - s3
    Description: Where /api/models should read checkpoint choices from
  ArtifactSource:
    Type: String
    Default: s3
    AllowedValues:
      - s3
      - gpu-worker
    Description: Where generated audio and training-audio URLs should be served from
  CorsOrigin:
    Type: String
    Description: Allowed frontend origin, for example https://your-cloudfront-domain.cloudfront.net
  VpcSubnetIds:
    Type: String
    Default: ''
    Description: Optional comma-separated private subnet IDs when Lambda must reach a private GPU EC2 IP
  VpcSecurityGroupIds:
    Type: String
    Default: ''
    Description: Optional comma-separated security group IDs for VPC-attached Lambda functions

Conditions:
  UseVpcConfig: !And
    - !Not [!Equals [!Ref VpcSubnetIds, '']]
    - !Not [!Equals [!Ref VpcSecurityGroupIds, '']]
  HasGpuInstanceId: !Not [!Equals [!Ref GpuInstanceId, '']]

Globals:
  Function:
    Runtime: nodejs20.x
    Timeout: 120
    MemorySize: 256
    VpcConfig: !If
      - UseVpcConfig
      - SecurityGroupIds: !Split [',', !Ref VpcSecurityGroupIds]
        SubnetIds: !Split [',', !Ref VpcSubnetIds]
      - !Ref AWS::NoValue
    Environment:
      Variables:
        S3_BUCKET: !Ref S3Bucket
        S3_REGION: !Ref S3Region
        S3_PREFIX: !Ref S3Prefix
        GPU_WORKER_URL: !Ref GpuWorkerUrl
        GPU_WORKER_PUBLIC_URL: !Ref GpuWorkerPublicUrl
        GPU_INSTANCE_ID: !Ref GpuInstanceId
        GPU_INSTANCE_REGION: !Ref GpuInstanceRegion
        MODEL_SOURCE: !Ref ModelSource
        ARTIFACT_SOURCE: !Ref ArtifactSource
        CORS_ORIGIN: !Ref CorsOrigin

Resources:
  VoiceCloningApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      CorsConfiguration:
        AllowOrigins:
          - !Ref CorsOrigin
        AllowHeaders:
          - Content-Type
          - Authorization
        AllowMethods:
          - GET
          - POST
          - OPTIONS
        MaxAge: 300

  ConfigFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: config/index.handler
      CodeUri: .
      Policies:
        - !If [UseVpcConfig, AWSLambdaVPCAccessExecutionRole, !Ref AWS::NoValue]
      Events:
        GetConfig:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/config
            Method: GET

  InstanceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: instance/index.handler
      CodeUri: .
      Timeout: 30
      Policies:
        - !If [UseVpcConfig, AWSLambdaVPCAccessExecutionRole, !Ref AWS::NoValue]
        - Statement:
            - Effect: Allow
              Action:
                - ec2:DescribeInstances
                - ec2:DescribeInstanceStatus
              Resource: '*'
            - !If
              - HasGpuInstanceId
              - Effect: Allow
                Action:
                  - ec2:StartInstances
                Resource: !Sub
                  - arn:${AWS::Partition}:ec2:${InstanceRegion}:${AWS::AccountId}:instance/${InstanceId}
                  - InstanceRegion: !Ref GpuInstanceRegion
                    InstanceId: !Ref GpuInstanceId
              - !Ref AWS::NoValue
      Events:
        InstanceStatus:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/instance/status
            Method: GET
        InstanceStart:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/instance/start
            Method: POST

  UploadFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: upload/index.handler
      CodeUri: .
      Policies:
        - !If [UseVpcConfig, AWSLambdaVPCAccessExecutionRole, !Ref AWS::NoValue]
        - S3CrudPolicy:
            BucketName: !Ref S3Bucket
      Events:
        UploadPresign:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/upload/presign
            Method: POST
        UploadConfirm:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/upload/confirm
            Method: POST
        RefPresign:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/upload-ref/presign
            Method: POST
        RefConfirm:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/upload-ref/confirm
            Method: POST

  TrainingFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: training/index.handler
      CodeUri: .
      Policies:
        - !If [UseVpcConfig, AWSLambdaVPCAccessExecutionRole, !Ref AWS::NoValue]
      Events:
        Train:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/train
            Method: POST
        TrainStop:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/train/stop
            Method: POST
        TrainCurrent:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/train/current
            Method: GET

  ModelsFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: models/index.handler
      CodeUri: .
      Timeout: 300
      Policies:
        - !If [UseVpcConfig, AWSLambdaVPCAccessExecutionRole, !Ref AWS::NoValue]
        - S3ReadPolicy:
            BucketName: !Ref S3Bucket
      Events:
        ListModels:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/models
            Method: GET
        SelectModels:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/models/select
            Method: POST

  InferenceFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: inference/index.handler
      CodeUri: .
      Timeout: 300
      Policies:
        - !If [UseVpcConfig, AWSLambdaVPCAccessExecutionRole, !Ref AWS::NoValue]
        - S3ReadPolicy:
            BucketName: !Ref S3Bucket
      Events:
        DirectInference:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/inference
            Method: POST
        Generate:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/inference/generate
            Method: POST
        Result:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/inference/result/{sessionId}
            Method: GET
        Cancel:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/inference/cancel
            Method: POST
        Current:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/inference/current
            Method: GET
        Status:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/inference/status
            Method: GET
        Stop:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/inference/stop
            Method: POST

  TranscribeFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: transcribe/index.handler
      CodeUri: .
      Timeout: 120
      Policies:
        - !If [UseVpcConfig, AWSLambdaVPCAccessExecutionRole, !Ref AWS::NoValue]
      Events:
        Transcribe:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/transcribe
            Method: POST

  TrainingAudioFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: training-audio/index.handler
      CodeUri: .
      Policies:
        - !If [UseVpcConfig, AWSLambdaVPCAccessExecutionRole, !Ref AWS::NoValue]
        - S3ReadPolicy:
            BucketName: !Ref S3Bucket
      Events:
        ListAudio:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/training-audio/{expName}
            Method: GET
        GetAudioFile:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/training-audio/file/{expName}/{filename}
            Method: GET
        RefAudio:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/ref-audio
            Method: GET

  LiveFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: live/index.handler
      CodeUri: .
      Timeout: 120
      Policies:
        - !If [UseVpcConfig, AWSLambdaVPCAccessExecutionRole, !Ref AWS::NoValue]
      Events:
        TtsSentence:
          Type: HttpApi
          Properties:
            ApiId: !Ref VoiceCloningApi
            Path: /api/live/tts-sentence
            Method: POST

Outputs:
  ApiEndpoint:
    Description: API Gateway endpoint URL
    Value: !Sub https://${VoiceCloningApi}.execute-api.${AWS::Region}.amazonaws.com
